<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hook reminders</title>
</head>
<body>
  <script>
    async function maybeNotifyOnOpen() {
      if (!('Notification' in window)) return;

      // Ask permission (must be user-initiated in many browsers; auto-open may be blocked)
      const permission = await Notification.requestPermission();

      if (permission === 'granted') {
        new Notification("It's time to vote!", { body: "Check Hook to start voting!" });
      }
    }

    // Try on open (may be blocked unless user has interacted)
    window.addEventListener('DOMContentLoaded', maybeNotifyOnOpen);
  </script>

  <!-- Recommended: user click to ensure it isn't blocked -->
  <button id="enable-btn">Enable notifications</button>

  <script>
    document.getElementById('enable-btn')?.addEventListener('click', async () => {
      if (!('Notification' in window)) return;

      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        new Notification("It's time to vote!", { body: "Check Hook to start voting!" });
      }
    });
  </script>
</body>
</html>
