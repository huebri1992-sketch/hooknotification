<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enable notifications</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(100%, 360px);
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }
    button {
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      background: #17dd61;
      color: white;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }
    button:hover { background: #14a34a; }
    p { line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Enable notifications</h2>
    <p>Allow Hook to send quick reminders when it is time to vote.</p>
    <button id="enable-btn" type="button">Enable notifications</button>
  </div>

  <script>
    document.getElementById('enable-btn').addEventListener('click', function () {
      window.parent.postMessage({ type: 'request-notification-permission' }, '*');
    });
  </script>
</body>
</html>
