<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hook reminders</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(100%, 360px);
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }
    button {
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      background: #17dd61;
      color: white;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }
    button:hover { background: #14a34a; }
    p { line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Stay on track</h2>
    <p>Enable notifications so Hook can remind you when it is time to vote.</p>
    <button id="notifyBtn">Enable notifications</button>
  </div>

<script>
  const btn = document.getElementById('notifyBtn');

  btn.addEventListener('click', async () => {
    if (!('Notification' in window)) {
      console.log('Notifications not supported');
      return;
    }

    const permission = await Notification.requestPermission();
    console.log('Permission:', permission);

    if (permission === 'granted') {
      window.parent.postMessage({ type: 'requestpush-complete' }, '*');
      window.location.replace('https://google.com');
    }
  });
</script>
