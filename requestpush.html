<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hook reminders</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(100%, 360px);
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }
    button {
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      background: #17dd61;
      color: white;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }
    button:hover { background: #14a34a; }
    p { line-height: 1.5; }
    .status { margin-top: 12px; font-size: 14px; color: #4b5563; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Stay on track</h2>
    <p>Enable notifications so Hook can remind you when it is time to vote.</p>
    <button id="notifyBtn">Enable notifications</button>
    <p id="status" class="status">This page will register a browser push subscription and keep your reminders active.</p>
  </div>

<script>
  const btn = document.getElementById('notifyBtn');
  const status = document.getElementById('status');
  const params = new URLSearchParams(window.location.search);
  const serverBaseUrl = params.get('server') || params.get('serverUrl') || window.__PUSH_SERVER_URL__ || window.location.origin;

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);

    for (let i = 0; i < rawData.length; i += 1) {
      outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
  }

  async function registerPush() {
    if (!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)) {
      status.textContent = 'This browser does not support web push notifications.';
      return;
    }

    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      status.textContent = 'Notifications were not enabled. Please allow them to receive reminders.';
      return;
    }

    try {
      const swUrl = new URL('./sw.js', window.location.href);
      const registration = await navigator.serviceWorker.register(swUrl.href, { scope: '/' });
      await registration.update();
      await navigator.serviceWorker.ready;

      const response = await fetch(new URL('/vapid-public-key', serverBaseUrl));
      const publicKey = await response.text();

      const subscription = await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey)
      });

      const subscribeResponse = await fetch(new URL('/subscribe', serverBaseUrl), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ subscription })
      });

      if (!subscribeResponse.ok) {
        throw new Error('Unable to save the subscription');
      }

      status.textContent = 'Notifications are enabled. You will receive reminders when voting time arrives.';
      btn.textContent = 'Enabled';
      btn.disabled = true;
      window.parent.postMessage({ type: 'requestpush-complete' }, '*');
    } catch (error) {
      console.error(error);
      status.textContent = 'Something went wrong while enabling notifications.';
    }
  }

  btn.addEventListener('click', registerPush);
</script>
</body>
</html>
